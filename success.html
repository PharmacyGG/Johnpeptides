<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order received — PepGuide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css?v=20260629" />
  <style>
    body { background: var(--offwhite); min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    .success-card {
      max-width: 480px;
      background: white;
      border-radius: 28px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 24px 60px -20px rgba(15, 27, 45, 0.15);
    }
    .success-check {
      width: 64px; height: 64px;
      border-radius: 999px;
      background: var(--orange);
      color: white;
      display: grid; place-items: center;
      margin: 0 auto 1.5rem;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <img src="assets/img/logo.png" alt="PepGuide" style="width: 64px; height: auto; margin: 0 auto 1.5rem; display: block;" />
    <div class="success-check">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
    </div>
    <h1 class="font-serif text-3xl font-semibold text-ink mb-3">Order received</h1>
    <p class="text-ink-2 opacity-70 mb-6">
      Thanks — we've sent a confirmation email with your order details. Your research compounds will dispatch within 1 business day.
    </p>
    <a href="/" class="cta-primary">Back to PepGuide</a>
  </div>
  <script>
    // Clear cart on success
    try { localStorage.removeItem('pepguide-cart'); } catch(e) {}
  </script>
</body>
</html>
